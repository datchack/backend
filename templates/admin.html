<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="meta_title">ADMIN - XAUTERMINAL</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="admin-body">
    <header class="admin-topbar">
        <div>
            <div class="admin-kicker" data-i18n="kicker">OWNER CONTROL</div>
            <h1 data-i18n="title">Administration</h1>
        </div>
        <div class="admin-top-actions">
            <a class="panel-btn admin-link" href="/terminal">TERMINAL</a>
            <button type="button" class="panel-btn" data-admin-lang-toggle>EN</button>
            <button type="button" class="panel-btn" id="admin-refresh" data-i18n="refresh">REFRESH</button>
        </div>
    </header>

    <main class="admin-shell">
        <section class="admin-metrics" aria-label="Statistiques utilisateurs">
            <div class="admin-metric">
                <span data-i18n="metric_total">TOTAL</span>
                <strong id="metric-total">0</strong>
            </div>
            <div class="admin-metric">
                <span data-i18n="metric_active">ACTIFS</span>
                <strong id="metric-active">0</strong>
            </div>
            <div class="admin-metric">
                <span data-i18n="metric_trial">ESSAIS</span>
                <strong id="metric-trial">0</strong>
            </div>
            <div class="admin-metric">
                <span data-i18n="metric_pending">EN ATTENTE</span>
                <strong id="metric-pending">0</strong>
            </div>
            <div class="admin-metric">
                <span data-i18n="metric_expired">EXPIRÉS</span>
                <strong id="metric-expired">0</strong>
            </div>
        </section>

        <section class="admin-panel">
            <div class="admin-panel-head">
                <div>
                    <span class="admin-kicker" data-i18n="users_kicker">USERS</span>
                    <h2 data-i18n="users_title">Comptes terminal</h2>
                </div>
                <div class="admin-filter">
                    <button type="button" class="panel-btn" id="admin-resend-activation" data-i18n="resend_activation">Relancer validations</button>
                    <input id="admin-search" type="search" placeholder="Rechercher un email" autocomplete="off" data-i18n-placeholder="search_placeholder">
                    <select id="admin-status-filter" title="Filtrer par statut" data-i18n-title="filter_title">
                        <option value="all" data-i18n="filter_all">TOUS</option>
                        <option value="owner">OWNER</option>
                        <option value="active">ACTIVE</option>
                        <option value="trial">TRIAL</option>
                        <option value="pending">PENDING</option>
                        <option value="expired">EXPIRED</option>
                    </select>
                </div>
            </div>

            <div id="admin-message" class="admin-message">Chargement...</div>

            <div class="admin-table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th data-i18n="role">Rôle</th>
                            <th data-i18n="status">Statut</th>
                            <th data-i18n="expiration">Expiration</th>
                            <th data-i18n="created">Création</th>
                            <th data-i18n="actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/static/admin.js"></script>
</body>
</html>
