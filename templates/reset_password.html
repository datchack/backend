<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="meta_title">Réinitialiser le mot de passe - XAUTERMINAL</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="canonical" href="https://xauterminal.com/reset-password">
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/static/apple-icon-180x180.png">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="landing-body account-body">
    <header class="landing-nav">
        <a class="landing-brand" href="/" aria-label="XAUTERMINAL">
            <img class="brand-logo" src="/static/xauterminal-logo.png" alt="" width="36" height="36">
            <span>XAUTERMINAL</span>
        </a>
        <nav class="landing-nav-actions" aria-label="Navigation mot de passe">
            <a href="/" data-i18n="back_landing">Retour landing</a>
            <button type="button" class="landing-lang" data-reset-lang-toggle>EN</button>
        </nav>
    </header>

    <main class="account-page reset-page">
        <section class="account-panel reset-panel">
            <div class="landing-kicker" data-i18n="kicker">SÉCURITÉ DU COMPTE</div>
            <h1 data-i18n="title">Choisis un nouveau mot de passe</h1>
            <p data-i18n="copy">Entre un nouveau mot de passe pour ton compte XAUTERMINAL. Le lien envoyé par email expire automatiquement.</p>
            <form class="account-form single" id="reset-password-form">
                <label>
                    <span data-i18n="new_password">Nouveau mot de passe</span>
                    <input id="reset-password-new" name="new_password" type="password" autocomplete="new-password" required minlength="8">
                </label>
                <label>
                    <span data-i18n="confirm_password">Confirmer le mot de passe</span>
                    <input id="reset-password-confirm" name="confirm_password" type="password" autocomplete="new-password" required minlength="8">
                </label>
                <button type="submit" class="resource-cta account-submit" data-i18n="submit">Mettre à jour le mot de passe</button>
            </form>
            <div class="account-message" id="reset-password-message"></div>
        </section>
    </main>

    <script src="/static/password-reset.js"></script>
</body>
</html>
